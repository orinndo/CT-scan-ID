<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>単純CT検査 インドネシア語音声ガイド</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Segoe UI",sans-serif;
background:linear-gradient(180deg,#f7fbff,#eef6ff);color:#0f172a;}
.header{padding:18px 16px 10px;}
.frame-title{border:2px solid #38bdf8;padding:14px 16px;border-radius:14px;background:#f8fcff;text-align:center;}
.frame-title h1{margin:0;font-size:20px;}
.frame-title p{margin:6px 0 0;font-size:14px;color:#475569;}
.note{font-size:12px;color:#475569;margin:12px 16px;}
.main{margin:0 16px 24px;padding:16px;background:#fff;border-radius:18px;box-shadow:0 8px 18px rgba(15,23,42,.08);}
.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
select{flex:1;max-width:100%;font-size:16px;padding:10px 36px 10px 12px;border-radius:12px;border:1px solid #cbd5f5;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
button{font-size:15px;padding:10px 14px;border-radius:12px;border:1px solid #cbd5f5;background:#eff6ff;}
button:active{transform:scale(.98);}
.label{margin-top:14px;font-size:13px;color:#475569;}
.jp{font-size:18px;font-weight:600;margin-top:6px;}
.en{font-size:16px;margin-top:4px;}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
audio{width:100%;margin-top:10px;}
.status{margin-top:8px;font-size:13px;color:#475569;}
.hint{margin-top:10px;font-size:12px;color:#64748b;}
</style>
</head>
<body>
<div class="header">
  <div class="frame-title">
    <h1>単純CT検査 インドネシア語音声ガイド</h1>
    <p>Panduan suara bahasa Indonesia</p>
  </div>
</div>

<p class="note">※ iPhone / iPad / Android で再生できます。最初は「再生」を押してください。</p>

<div class="main">
  <div class="row">
    <select id="sel"></select>
    <button id="prev">← 前</button>
    <button id="next">次 →</button>
  </div>

  <div class="label">日本語（内容）</div>
  <div class="jp" id="jp"></div>

  <div class="label">インドネシア語</div>
  <div class="en" id="en"></div>

  <div class="controls">
    <button id="play">▶︎ 再生</button>
    <button id="pause">⏸ 一時停止</button>
    <button id="replay">↻ もう一度</button>
  </div>

  <div class="status" id="status">待機中 / Siap diputar</div>
  <audio id="player" controls></audio>

  <div class="hint">
    再生できない場合：消音モード解除、音量、Bluetooth接続を確認してください。
  </div>
</div>

<script>
const STEPS = [
 {preview:"すみません、少しよろしいですか？", jp:"すみません、少しよろしいですか？", en:"Permisi, boleh minta waktunya sebentar?"},
 {preview:"こちらをご覧ください。これはあな…", jp:"こちらをご覧ください。これはあなたのお名前と生年月日で合っていますか？", en:"Silakan lihat ini. Apakah nama dan tanggal lahir Anda di sini sudah benar?"},
 {preview:"お名前と生年月日を教えていただけ…", jp:"お名前と生年月日を教えていただけますか？", en:"Boleh saya minta nama dan tanggal lahir Anda?"},
 {preview:"簡単な日本語は理解できますか？", jp:"簡単な日本語は理解できますか？", en:"Apakah Anda bisa memahami bahasa Jepang sederhana?"},
 {preview:"中国語の音声ガイドを使用します…", jp:"（通訳不在時）インドネシア語の音声ガイドで検査を説明します。音声の指示に従ってください。", en:"Kami akan menjelaskan pemeriksaan ini dengan panduan suara bahasa Indonesia. Mohon ikuti instruksi audio."},
 {preview:"中国語通訳を呼びますのでお待ち…", jp:"インドネシア語を話せる通訳を呼びますので、しばらくお待ちください。", en:"Kami akan memanggil penerjemah yang bisa berbahasa Indonesia. Mohon tunggu sebentar."},
 {preview:"どうぞお入りください。", jp:"どうぞお入りください。", en:"Silakan masuk."},
 {preview:"これからCT検査を行います。", jp:"これからCT検査を行います。", en:"Sekarang kami akan melakukan pemeriksaan CT."},
 {preview:"身につけている金属製品を外して…", jp:"身につけている金属製品を外してください。", en:"Mohon lepaskan benda logam yang sedang Anda pakai."},
 {preview:"ピアスや入れ歯など外してください…", jp:"画像に影響するため、ピアス、ネックレス、ヘアピン、ウィッグ、補聴器、入れ歯など、取り外せるものはすべて外してください。", en:"Agar gambar tidak terganggu, mohon lepaskan semua benda yang bisa dilepas, seperti anting, kalung, jepit rambut, wig, alat bantu dengar, dan gigi palsu."},
 {preview:"（男性）ズボンに金属があり検査に影響…", jp:"（男性）すみません、ズボンに金属があり検査に影響しますので、ベッドに寝た後、膝あたりまでズボンを下げてもらえますか？", en:"Maaf, ada logam pada celana Anda dan itu dapat memengaruhi pemeriksaan. Setelah Anda berbaring di tempat tidur, bolehkah celananya diturunkan sampai sekitar lutut?"},
 {preview:"（女性）ズボンに金属がありますので更衣室へ…", jp:"（女性）すみません、ズボンに金属があり検査に影響しますので、更衣室で検査着に着替えていただけますか？", en:"Maaf, ada logam pada celana Anda dan itu dapat memengaruhi pemeriksaan. Bisakah Anda berganti ke baju pemeriksaan di ruang ganti?"},
 {preview:"更衣室は17番受付の隣です…", jp:"（着替えが必要な場合）更衣室は17番受付の隣にあります。検査着に着替えて、終わったらここに戻ってきてください。", en:"Ruang ganti ada di sebelah loket nomor 17. Silakan ganti ke baju pemeriksaan, lalu setelah selesai berganti, kembali ke sini."},
 {preview:"胸にペースメーカーやICD、CRT…", jp:"（撮影範囲に胸部を含める場合のみ）胸にペースメーカーやICD、CRTなどの心臓の機器はありますか？", en:"Apakah ada alat jantung seperti pacemaker, ICD, atau CRT di dada Anda?"},
 {preview:"PM、CRT-Pありの場合：では検…", jp:"（PM、CRT-Pありの場合）では検査後に心臓の機器を確認して、正常に作動しているか確認しますね。", en:"Kalau begitu, setelah pemeriksaan selesai, kami akan memeriksa apakah alat jantung Anda berfungsi dengan normal."},
 {preview:"ICD、CRT-Dありの場合：では…", jp:"（ICD、CRT-Dありの場合）では検査の前後に心臓の機器を確認して、正常に作動しているか確認しますね。", en:"Kalau begitu, sebelum dan sesudah pemeriksaan, kami akan memeriksa apakah alat jantung Anda berfungsi dengan normal."},
 {preview:"ベッドに座って靴を脱いでくださ…", jp:"ベッドに座って靴を脱いでください。", en:"Silakan duduk di tempat tidur dan lepaskan sepatu Anda."},
 {preview:"ベッドに仰向けで寝てください。", jp:"ベッドに仰向けで寝てください。", en:"Silakan berbaring telentang di tempat tidur."},
 {preview:"頭がここで足先がここです。", jp:"頭がここで足先がここです。", en:"Kepala di sini, kaki di sana."},
 {preview:"少し上に動いてください…", jp:"少し上の方に動いてください。", en:"Silakan geser sedikit ke atas."},
 {preview:"少し下に動いてください…", jp:"少し下の方に動いてください。", en:"Silakan geser sedikit ke bawah."},
 {preview:"両手を頭の上に上げてください。", jp:"両手を頭の上に上げてください。", en:"Silakan angkat kedua tangan Anda ke atas kepala."},
 {preview:"頭を動かさないでください…", jp:"（頭部CTのみ）頭を動かさないでください。そのままじっとしてください。", en:"Mohon jangan gerakkan kepala. Tetap diam seperti itu."},
 {preview:"検査中にインドネシア語で息止めの指示を…", jp:"検査中にインドネシア語で息止めの指示を出しますので、その指示に従ってください。", en:"Selama pemeriksaan, akan ada instruksi menahan napas dalam bahasa Indonesia. Mohon ikuti instruksi tersebut."},
 {preview:"ベッドが動きます。", jp:"ベッドが動きます。", en:"Tempat tidur akan bergerak."},
 {preview:"検査が終わりました。", jp:"検査が終わりました。", en:"Pemeriksaan sudah selesai."},
 {preview:"検査ご協力ありがとうございました…", jp:"検査ご協力ありがとうございました。", en:"Terima kasih atas kerja samanya selama pemeriksaan."},
 {preview:"ベッドが停止するまでは寝たまま…", jp:"ベッドが停止するまでは寝たままでお願いします。", en:"Mohon tetap berbaring sampai tempat tidurnya benar-benar berhenti."},
 {preview:"今から心臓の機械を確認します…", jp:"今から、心臓の機械が正常に作動しているか確認しますね。", en:"Sekarang kami akan memeriksa apakah alat jantung Anda berfungsi dengan normal."},
 {preview:"ゆっくり体を起こしてください。", jp:"ゆっくり体を起こしてください。", en:"Silakan bangunkan tubuh Anda perlahan dan duduk pelan-pelan."},
 {preview:"次は診察がありますので、10番へ…", jp:"次は診察がありますので、10番へ行ってこのファイルを提出してください。", en:"Selanjutnya ada konsultasi dokter. Silakan pergi ke nomor 10 dan serahkan berkas ini kepada petugas."},
 {preview:"19番または20番の前でお待ちくだ…", jp:"19番または20番の検査室の前でお待ちください。", en:"Silakan menunggu di depan ruang pemeriksaan nomor 19 atau 20."},
 {preview:"23番の前でお待ちください。", jp:"23番の検査室の前でお待ちください。", en:"Silakan menunggu di depan ruang pemeriksaan nomor 23."},
 {preview:"15番の前でお待ちください。", jp:"15番の検査室の前でお待ちください。", en:"Silakan menunggu di depan ruang pemeriksaan nomor 15."},
 {preview:"もう着替えてもいいですよ。", jp:"（着替えていい場合）もう着替えてもいいですよ。", en:"Anda sudah boleh berganti pakaian sekarang."},
 {preview:"まだ他の検査が残っています。", jp:"（他検査がある場合）まだ他の検査が残っています。", en:"Masih ada pemeriksaan lain yang tersisa."},
 {preview:"まだ着替えないでください。", jp:"（他検査がある場合）まだ着替えないでください。", en:"Mohon jangan berganti pakaian dulu."},
 {preview:"お大事になさってください。", jp:"お大事になさってください。", en:"Semoga lekas membaik."},
];

const sel=document.getElementById('sel'),
jp=document.getElementById('jp'),
en=document.getElementById('en'),
player=document.getElementById('player'),
status=document.getElementById('status');

STEPS.forEach((s,i)=>{
 const o=document.createElement('option');
 o.value=i;
 o.textContent=`${String(i+1).padStart(2,'0')}｜${s.jp}`;
 sel.appendChild(o);
});

let idx=0;
function load(i){
 idx=Math.max(0,Math.min(STEPS.length-1,i));
 sel.value=idx;
 jp.textContent=STEPS[idx].jp;
 en.textContent=STEPS[idx].en;
 player.src=`audio/step_${String(idx+1).padStart(2,'0')}.m4a`;
 status.textContent="待機中 / Siap diputar";
}
sel.onchange=()=>load(parseInt(sel.value));
document.getElementById('prev').onclick=()=>load(idx-1);
document.getElementById('next').onclick=()=>load(idx+1);
document.getElementById('play').onclick=()=>player.play();
document.getElementById('pause').onclick=()=>player.pause();
document.getElementById('replay').onclick=()=>{player.currentTime=0;player.play();}
player.onplay=()=>status.textContent="再生中 / Sedang diputar";
player.onpause=()=>status.textContent="一時停止 / Dijeda";
player.onended=()=>status.textContent="待機中 / Siap diputar";
load(0);
</script>
</body>
</html>
